name: zatch-pr-gate

# Lightweight pull-request liveness gate for the Zatch autonomous SDLC pipeline.
#
# cal.diy (like upstream cal.com) runs its full CI suite in the merge queue
# (`all-checks.yml` triggers on `merge_group`), NOT on `pull_request`. As a
# result PRs otherwise carry zero observable status checks, and the Zatch `pr`
# phase's check observer — which deliberately never treats "no observable checks"
# as green — cannot confirm a live, non-empty PR and blocks.
#
# The real quality bar (type-check / lint / unit tests) is already enforced
# inside the Zatch `verify` phase BEFORE a PR is ever opened, so this workflow is
# intentionally a lightweight liveness gate, not a re-run of CI. It gives every
# PR exactly one observable green check so the pipeline can distinguish
# "PR is live" from "checks unknown", without duplicating the heavy merge-queue CI.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: zatch-pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zatch-pr-gate:
    name: Zatch PR gate
    runs-on: ubuntu-latest
    steps:
      - name: Confirm PR is live
        run: |
          echo "Zatch PR gate: PR #${{ github.event.pull_request.number }} is live."
          echo "Quality (type-check / lint / unit) is enforced by the Zatch verify phase before this PR was opened."
